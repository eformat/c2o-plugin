apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "c2o-plugin.fullname" . }}-enable
  labels:
    {{- include "c2o-plugin.labels" . | nindent 4 }}
rules:
  - apiGroups: ["operator.openshift.io"]
    resources: ["consoles"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "c2o-plugin.fullname" . }}-enable
  labels:
    {{- include "c2o-plugin.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "c2o-plugin.fullname" . }}-enable
subjects:
  - kind: ServiceAccount
    name: {{ include "c2o-plugin.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
